name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: [8.1, 8.2, 8.3]
        prefer-lowest: [false]
        include:
          - php: 8.1
            prefer-lowest: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, json
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: |
          if [ "${{ matrix.prefer-lowest }}" = "true" ]; then
            composer update --prefer-lowest --prefer-stable --no-interaction
          else
            composer install --no-interaction
          fi

      - name: PHP syntax check
        run: find src bin -name '*.php' -exec php -l {} \;

      - name: Run tests
        run: vendor/bin/phpunit --no-coverage

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress || echo "PHPStan warnings (non-blocking)"
